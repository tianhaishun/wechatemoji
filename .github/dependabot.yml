version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/tauri_app"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/tauri_app/src-tauri"
    schedule:
      interval: "weekly"
