name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python sanity checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python entry points
        run: |
          python -m py_compile `
            main.py `
            config.py `
            gui.py `
            key_extractor.py `
            wechat_extractor.py `
            bridge_common.py `
            feishu_uploader.py `
            tauri_bridge.py `
            stage_playwright_runtime.py `
            sniff_feishu.py

  tauri-shell:
    name: Tauri shell check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cargo fmt check
        working-directory: tauri_app/src-tauri
        run: cargo fmt --all --check

      - name: Cargo check
        working-directory: tauri_app/src-tauri
        run: cargo check
