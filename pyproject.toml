[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
  "build",
  "dist",
  "vendor/ms-playwright",
  "tauri_app/node_modules",
  "tauri_app/src-tauri/target",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "W", "B"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = [
  "bridge_common",
  "config",
  "feishu_uploader",
  "gui",
  "key_extractor",
  "sniff_feishu",
  "stage_playwright_runtime",
  "tauri_bridge",
  "wechat_extractor",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
